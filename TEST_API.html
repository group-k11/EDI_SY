<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1f2e; color: #e2e8f0; }
        .box { background: #2d3748; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔬 API Test Page</h1>
    
    <button onclick="testThreats()">Test /api/threats</button>
    <button onclick="testTraffic()">Test /api/traffic</button>
    <button onclick="testStatus()">Test /api/system-status</button>
    <button onclick="simulateAttack()">Simulate DDoS</button>
    
    <div id="output"></div>

    <script>
        const output = document.getElementById('output');
        
        async function testThreats() {
            try {
                const res = await fetch('http://localhost:8000/api/threats');
                const data = await res.json();
                output.innerHTML = `<div class="box success">
                    <h3>✅ /api/threats SUCCESS</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                </div>`;
            } catch (e) {
                output.innerHTML = `<div class="box error">
                    <h3>❌ /api/threats FAILED</h3>
                    <pre>${e.message}</pre>
                </div>`;
            }
        }
        
        async function testTraffic() {
            try {
                const res = await fetch('http://localhost:8000/api/traffic');
                const data = await res.json();
                output.innerHTML = `<div class="box success">
                    <h3>✅ /api/traffic SUCCESS</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                </div>`;
            } catch (e) {
                output.innerHTML = `<div class="box error">
                    <h3>❌ /api/traffic FAILED</h3>
                    <pre>${e.message}</pre>
                </div>`;
            }
        }
        
        async function testStatus() {
            try {
                const res = await fetch('http://localhost:8000/api/system-status');
                const data = await res.json();
                output.innerHTML = `<div class="box success">
                    <h3>✅ /api/system-status SUCCESS</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                </div>`;
            } catch (e) {
                output.innerHTML = `<div class="box error">
                    <h3>❌ /api/system-status FAILED</h3>
                    <pre>${e.message}</pre>
                </div>`;
            }
        }
        
        async function simulateAttack() {
            try {
                const res = await fetch('http://localhost:8000/api/simulate/ddos', { method: 'POST' });
                const data = await res.json();
                output.innerHTML = `<div class="box success">
                    <h3>✅ Simulation SUCCESS</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                    <p>Wait 5 seconds then click "Test /api/threats" to see results</p>
                </div>`;
            } catch (e) {
                output.innerHTML = `<div class="box error">
                    <h3>❌ Simulation FAILED</h3>
                    <pre>${e.message}</pre>
                </div>`;
            }
        }
        
        // Auto-test on load
        setTimeout(testStatus, 1000);
    </script>
</body>
</html>
